  <style>/* Rx2Realty warm editorial design system */

:root {
  --bg: #faf7f2;
  --bg-elev: #f4f0e8;
  --bg-card: #ffffff;
  --ink: #1f1d1a;
  --ink-soft: #4a4642;
  --ink-mute: #7a756e;
  --rule: #e5dfd3;
  --rule-strong: #d4ccbc;

  --sage: #2d4a3e;
  --sage-deep: #1e332a;
  --sage-soft: #e4ebe4;
  --terracotta: #c76d4a;
  --terracotta-soft: #f4e3d8;
  --amber: #c9a961;

  --font-display: 'Newsreader', Georgia, serif;
  --font-body: 'Inter', -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, monospace;

  --radius-sm: 6px;
  --radius: 10px;
  --radius-lg: 16px;

  --shadow-card: 0 1px 2px rgba(31, 29, 26, 0.04), 0 4px 16px rgba(31, 29, 26, 0.04);
  --shadow-pop: 0 2px 4px rgba(31, 29, 26, 0.06), 0 12px 32px rgba(31, 29, 26, 0.08);
}

/* Font pairing variants (switched by data-fonts on <html>) */
html[data-fonts="editorial"] {
  --font-display: 'Newsreader', Georgia, serif;
  --font-body: 'Inter', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}
html[data-fonts="warm-serif"] {
  --font-display: 'DM Serif Display', Georgia, serif;
  --font-body: 'Work Sans', sans-serif;
  --font-mono: 'IBM Plex Mono', monospace;
}
html[data-fonts="modern-grotesk"] {
  --font-display: 'Instrument Serif', Georgia, serif;
  --font-body: 'Geist', -apple-system, sans-serif;
  --font-mono: 'Geist Mono', monospace;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font-body);
  font-size: 16px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

body {
  /* subtle paper texture */
  background-image:
    radial-gradient(circle at 20% 10%, rgba(199, 109, 74, 0.03), transparent 40%),
    radial-gradient(circle at 80% 90%, rgba(45, 74, 62, 0.03), transparent 40%);
  background-attachment: fixed;
}

h1, h2, h3, h4 {
  font-family: var(--font-display);
  font-weight: 500;
  letter-spacing: -0.015em;
  color: var(--ink);
  margin: 0;
  text-wrap: balance;
}

p { margin: 0; text-wrap: pretty; }

a { color: inherit; text-decoration: none; }

button {
  font-family: inherit;
  font-size: inherit;
  cursor: pointer;
  border: none;
  background: none;
  color: inherit;
  padding: 0;
}

::selection { background: var(--terracotta-soft); color: var(--sage-deep); }

/* ---------- Layout ---------- */

.app {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

.container {
  max-width: 1140px;
  margin: 0 auto;
  padding: 0 32px;
  width: 100%;
}

.container-narrow {
  max-width: 720px;
  margin: 0 auto;
  padding: 0 32px;
  width: 100%;
}

/* ---------- Nav ---------- */

.nav {
  position: sticky;
  top: 0;
  z-index: 40;
  background: rgba(250, 247, 242, 0.88);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--rule);
}

.nav-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 64px;
}

.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: var(--font-display);
  font-size: 22px;
  letter-spacing: -0.02em;
  font-weight: 500;
}

.brand-mark-svg {
  display: block;
  flex-shrink: 0;
}

.brand-name em {
  font-style: italic;
  color: var(--terracotta);
  font-weight: 400;
}

.brand-tagline {
  font-family: var(--font-display);
  font-style: italic;
  font-size: 15px;
  color: var(--ink-soft);
  padding-left: 14px;
  margin-left: 4px;
  border-left: 1px solid var(--rule);
  line-height: 1.1;
}
@media (max-width: 820px) { .brand-tagline { display: none; } }

.hero-portrait {
  width: 88px;
  height: 88px;
  border-radius: 50%;
  object-fit: cover;
  display: block;
  margin-bottom: 24px;
  border: 2px solid var(--rule);
  box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
}

.nav-links {
  display: flex;
  align-items: center;
  gap: 4px;
}

.nav-link {
  font-size: 14px;
  padding: 8px 14px;
  border-radius: 8px;
  color: var(--ink-soft);
  font-weight: 500;
  transition: background 0.15s, color 0.15s;
}
.nav-link:hover { background: var(--bg-elev); color: var(--ink); }
.nav-link.active { color: var(--sage-deep); background: var(--sage-soft); }

.nav-cta {
  font-size: 13px;
  padding: 8px 14px;
  border-radius: 8px;
  background: var(--ink);
  color: var(--bg);
  margin-left: 8px;
  font-weight: 500;
  transition: transform 0.15s;
}
.nav-cta:hover { transform: translateY(-1px); }

/* ---------- Buttons ---------- */

.btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 18px;
  border-radius: 8px;
  font-weight: 500;
  font-size: 14px;
  border: 1px solid transparent;
  transition: all 0.15s;
}
.btn-primary {
  background: var(--sage);
  color: var(--bg);
}
.btn-primary:hover { background: var(--sage-deep); transform: translateY(-1px); }
.btn-ghost {
  background: transparent;
  border-color: var(--rule-strong);
  color: var(--ink);
}
.btn-ghost:hover { background: var(--bg-elev); }
.btn-terra {
  background: var(--terracotta);
  color: #fff;
}
.btn-terra:hover { background: #b35a38; }
.btn-sm { padding: 6px 12px; font-size: 13px; }

/* ---------- Chips / Tags ---------- */

.chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.01em;
  border: 1px solid var(--rule-strong);
  background: var(--bg-card);
  color: var(--ink-soft);
}
.chip.chip-sage { background: var(--sage-soft); border-color: transparent; color: var(--sage-deep); }
.chip.chip-terra { background: var(--terracotta-soft); border-color: transparent; color: #8f4a2a; }
.chip.chip-amber { background: #f5ecd6; border-color: transparent; color: #7a5f1c; }

.dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: currentColor;
}

/* ---------- Cards ---------- */

.card {
  background: var(--bg-card);
  border: 1px solid var(--rule);
  border-radius: var(--radius);
  overflow: hidden;
}

.eyebrow {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--ink-mute);
  font-weight: 500;
}

/* ---------- Hero ---------- */

.hero {
  padding: 72px 0 56px;
  position: relative;
}

.hero-grid {
  display: grid;
  grid-template-columns: 1.15fr 1fr;
  gap: 56px;
  align-items: start;
}

.hero-headline {
  font-family: var(--font-display);
  font-size: clamp(44px, 6vw, 76px);
  line-height: 1.02;
  letter-spacing: -0.03em;
  font-weight: 400;
}
.hero-headline em {
  font-style: italic;
  color: var(--terracotta);
}
.hero-headline .arrow {
  display: inline-block;
  font-family: var(--font-mono);
  font-style: normal;
  color: var(--sage);
  font-weight: 400;
  transform: translateY(-0.12em);
  margin: 0 0.04em;
}

.hero-sub {
  font-size: 18px;
  line-height: 1.6;
  color: var(--ink-soft);
  max-width: 50ch;
  margin-top: 28px;
}

.hero-actions {
  margin-top: 32px;
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}

.hero-meta {
  margin-top: 40px;
  display: flex;
  gap: 32px;
  flex-wrap: wrap;
  font-size: 13px;
  color: var(--ink-mute);
}
.hero-meta strong { color: var(--ink); font-weight: 600; }

/* ---------- Countdown card ---------- */

.countdown {
  background: var(--sage-deep);
  color: var(--bg);
  border-radius: var(--radius-lg);
  padding: 28px;
  box-shadow: var(--shadow-pop);
  position: relative;
  overflow: hidden;
}
.countdown::before {
  content: '';
  position: absolute;
  right: -40px;
  top: -40px;
  width: 180px;
  height: 180px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(199, 109, 74, 0.35), transparent 70%);
  pointer-events: none;
}
.countdown-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}
.countdown-title {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(250, 247, 242, 0.6);
}
.countdown-live {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: #9dd4b8;
  letter-spacing: 0.05em;
}
.countdown-live .pulse {
  width: 6px; height: 6px; border-radius: 50%;
  background: #9dd4b8;
  box-shadow: 0 0 0 0 rgba(157, 212, 184, 0.7);
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0% { box-shadow: 0 0 0 0 rgba(157, 212, 184, 0.7); }
  70% { box-shadow: 0 0 0 10px rgba(157, 212, 184, 0); }
  100% { box-shadow: 0 0 0 0 rgba(157, 212, 184, 0); }
}

.countdown-exam {
  font-family: var(--font-display);
  font-size: 22px;
  line-height: 1.2;
  margin-bottom: 4px;
}
.countdown-exam em { font-style: italic; color: var(--terracotta); }

.countdown-date {
  font-family: var(--font-mono);
  font-size: 12px;
  color: rgba(250, 247, 242, 0.55);
  margin-bottom: 24px;
}

.countdown-digits {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-bottom: 24px;
}
.countdown-cell {
  background: rgba(250, 247, 242, 0.06);
  border: 1px solid rgba(250, 247, 242, 0.1);
  border-radius: 8px;
  padding: 14px 8px;
  text-align: center;
}
.countdown-num {
  font-family: var(--font-mono);
  font-size: 30px;
  font-weight: 600;
  line-height: 1;
  color: var(--bg);
  font-variant-numeric: tabular-nums;
}
.countdown-lbl {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: rgba(250, 247, 242, 0.5);
  margin-top: 6px;
}

.progress-track {
  height: 6px;
  background: rgba(250, 247, 242, 0.08);
  border-radius: 999px;
  overflow: hidden;
  margin-bottom: 14px;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--terracotta), #e89f7e);
  border-radius: 999px;
  transition: width 0.6s ease;
}

.countdown-stats {
  display: flex;
  justify-content: space-between;
  font-family: var(--font-mono);
  font-size: 11px;
  color: rgba(250, 247, 242, 0.6);
}
.countdown-stats strong { color: var(--bg); font-weight: 600; }

/* ---------- Sections ---------- */

.section {
  padding: 72px 0;
  border-top: 1px solid var(--rule);
}

.section-head {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 32px;
  margin-bottom: 40px;
  flex-wrap: wrap;
}
.section-title {
  font-size: clamp(28px, 3.2vw, 40px);
  letter-spacing: -0.02em;
  line-height: 1.1;
  max-width: 20ch;
}
.section-title em { font-style: italic; color: var(--terracotta); }
.section-sub {
  color: var(--ink-soft);
  font-size: 15px;
  max-width: 40ch;
}
.section-link {
  font-size: 14px;
  color: var(--sage);
  font-weight: 500;
  display: inline-flex;
  align-items: center;

  <script src="vendor/react.development.js"></script>

  <script>
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "fontPairing": "modern-grotesk"
    }/*EDITMODE-END*/;

</head>
<body>
  <div id="root"></div>

  <script src="js/data.js"></script>
  <script type="text/babel" src="js/shared.js"></script>
  <script type="text/babel" src="js/pages.js"></script>
  <script type="text/babel" src="js/ask.js"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const FONT_OPTS = [
      { id: 'editorial', name: 'Editorial', desc: 'Newsreader + Inter' },
      { id: 'warm-serif', name: 'Warm serif', desc: 'DM Serif + Work Sans' },
      { id: 'modern-grotesk', name: 'Modern', desc: 'Instrument Serif + Inter' },
    ];

    function App() {
      const [route, setRoute] = useState(() => localStorage.getItem('r2r_route') || 'home');
      const [postId, setPostId] = useState(null);
      const [fonts, setFonts] = useState(() => localStorage.getItem('r2r_fonts') || TWEAK_DEFAULTS.fontPairing || 'editorial');
      const [tweaksOpen, setTweaksOpen] = useState(false);

      useEffect(() => {
        localStorage.setItem('r2r_route', route);
        window.scrollTo({ top: 0, behavior: 'instant' });
      }, [route]);

      useEffect(() => {
        document.documentElement.setAttribute('data-fonts', fonts);
        localStorage.setItem('r2r_fonts', fonts);
      }, [fonts]);

      // Edit-mode host integration
      useEffect(() => {
        const handler = (e) => {
          const msg = e.data || {};
          if (msg.type === '__activate_edit_mode') setTweaksOpen(true);
          if (msg.type === '__deactivate_edit_mode') setTweaksOpen(false);
        };
        window.addEventListener('message', handler);
        window.parent.postMessage({ type: '__edit_mode_available' }, '*');
        return () => window.removeEventListener('message', handler);
      }, []);

      const changeFonts = (id) => {
        setFonts(id);
        window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { fontPairing: id } }, '*');
      };

      let page;
      if (route === 'home') page = <HomePage setRoute={setRoute} setPostId={setPostId}/>;
      else if (route === 'journal') page = <JournalPage setRoute={setRoute} setPostId={setPostId}/>;
      else if (route === 'post') page = <PostPage postId={postId} setRoute={setRoute}/>;
      else if (route === 'ask') page = <AskPage/>;
      else if (route === 'about') page = <AboutPage/>;
      else page = <HomePage setRoute={setRoute} setPostId={setPostId}/>;

      return (
        <div className="app">
          <Nav route={route} setRoute={setRoute}/>
          {page}
          <Footer/>
          {tweaksOpen && (
            <div className="tweaks">
              <div className="tweaks-head">
                <div className="tweaks-title">Tweaks</div>
                <button className="tweaks-close" onClick={() => setTweaksOpen(false)}>×</button>
              </div>
              <div className="tweaks-label">Font pairing</div>
              <div className="tweaks-opts">
                {FONT_OPTS.map(o => (
                  <button
                    key={o.id}
                    className={'tweaks-opt' + (fonts === o.id ? ' active' : '')}
                    onClick={() => changeFonts(o.id)}
                  >
                    <div className="tweaks-opt-name">{o.name}</div>
                    <div className="tweaks-opt-desc">{o.desc}</div>
                  </button>
                ))}
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>


</body></html>
